version: 2

sources:
  - name: BRONZE 
    description: "Raw Olist marketplace data synced via Airbyte from RDS to S3 in Parquet format"
    database: OLIST_WAREHOUSE          
    schema: BRONZE      
    
    external:
      location: "{{ '@my_s3_external_dev_stage' if target.name != 'prod' else '@my_s3_external_stage' }}/raw/"
      file_format: "( type = parquet )"
      auto_refresh: true      

    tables:
      - name: orders_bronze
        description: "Core order lifecycle and status tracking"
        external:
          location: "@staging/raw/orders/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: order_id
            data_type: varchar
            expression: "$1:_airbyte_data:order_id::varchar"
          - name: customer_id
            data_type: varchar
            expression: "$1:_airbyte_data:customer_id::varchar"
          - name: order_status
            data_type: varchar
            expression: "$1:_airbyte_data:order_status::varchar"
          - name: order_purchase_timestamp
            data_type: timestamp
            expression: "$1:_airbyte_data:order_purchase_timestamp::timestamp"
          - name: order_approved_at
            data_type: timestamp
            expression: "$1:_airbyte_data:order_approved_at::timestamp"
          - name: order_delivered_carrier_date
            data_type: timestamp
            expression: "$1:_airbyte_data:order_delivered_carrier_date::timestamp"
          - name: order_delivered_customer_date
            data_type: timestamp
            expression: "$1:_airbyte_data:order_delivered_customer_date::timestamp"
          - name: order_estimated_delivery_date
            data_type: timestamp
            expression: "$1:_airbyte_data:order_estimated_delivery_date::timestamp"

      - name: order_items_bronze
        description: "Line-item details for items contained within an order"
        external:
          location: "@staging/raw/order_items/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: order_id
            data_type: varchar
            expression: "$1:_airbyte_data:order_id::varchar"
          - name: order_item_id
            data_type: number
            expression: "$1:_airbyte_data:order_item_id::number"
          - name: product_id
            data_type: varchar
            expression: "$1:_airbyte_data:product_id::varchar"
          - name: seller_id
            data_type: varchar
            expression: "$1:_airbyte_data:seller_id::varchar"
          - name: shipping_limit_date
            data_type: timestamp
            expression: "$1:_airbyte_data:shipping_limit_date::timestamp"
          - name: price
            data_type: float
            expression: "$1:_airbyte_data:price::float"
          - name: freight_value
            data_type: float
            expression: "$1:_airbyte_data:freight_value::float"

      - name: order_payments_bronze
        description: "Payment details split by payment option"
        external:
          location: "@staging/raw/order_payments/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: order_id
            data_type: varchar
            expression: "$1:_airbyte_data:order_id::varchar"
          - name: payment_sequential
            data_type: number
            expression: "$1:_airbyte_data:payment_sequential::number"
          - name: payment_type
            data_type: varchar
            expression: "$1:_airbyte_data:payment_type::varchar"
          - name: payment_installments
            data_type: number
            expression: "$1:_airbyte_data:payment_installments::number"
          - name: payment_value
            data_type: float
            expression: "$1:_airbyte_data:payment_value::float"

      - name: order_reviews_bronze
        description: "Customer satisfaction feedback data"
        external:
          location: "@staging/raw/order_reviews/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: review_id
            data_type: varchar
            expression: "$1:_airbyte_data:review_id::varchar"
          - name: order_id
            data_type: varchar
            expression: "$1:_airbyte_data:order_id::varchar"
          - name: review_score
            data_type: number
            expression: "$1:_airbyte_data:review_score::number"
          - name: review_comment_title
            data_type: varchar
            expression: "$1:_airbyte_data:review_comment_title::varchar"
          - name: review_comment_message
            data_type: varchar
            expression: "$1:_airbyte_data:review_comment_message::varchar"
          - name: review_creation_date
            data_type: timestamp
            expression: "$1:_airbyte_data:review_creation_date::timestamp"
          - name: review_answer_timestamp
            data_type: timestamp
            expression: "$1:_airbyte_data:review_answer_timestamp::timestamp"

      - name: customers_bronze
        description: "Customer demographics and geographical mapping info"
        external:
          location: "@staging/raw/customers/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: customer_id
            data_type: varchar
            expression: "$1:_airbyte_data:customer_id::varchar"
          - name: customer_unique_id
            data_type: varchar
            expression: "$1:_airbyte_data:customer_unique_id::varchar"
          - name: customer_zip_code_prefix
            data_type: varchar
            expression: "$1:_airbyte_data:customer_zip_code_prefix::varchar"
          - name: customer_city
            data_type: varchar
            expression: "$1:_airbyte_data:customer_city::varchar"
          - name: customer_state
            data_type: varchar
            expression: "$1:_airbyte_data:customer_state::varchar"

      - name: products_bronze
        description: "Product catalog meta-data including dimensions"
        external:
          location: "@staging/raw/products/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: product_id
            data_type: varchar
            expression: "$1:_airbyte_data:product_id::varchar"
          - name: product_category_name
            data_type: varchar
            expression: "$1:_airbyte_data:product_category_name::varchar"
          - name: product_name_lenght
            data_type: number
            expression: "$1:_airbyte_data:product_name_lenght::number"
          - name: product_description_lenght
            data_type: number
            expression: "$1:_airbyte_data:product_description_lenght::number"
          - name: product_photos_qty
            data_type: number
            expression: "$1:_airbyte_data:product_photos_qty::number"
          - name: product_weight_g
            data_type: number
            expression: "$1:_airbyte_data:product_weight_g::number"
          - name: product_length_cm
            data_type: number
            expression: "$1:_airbyte_data:product_length_cm::number"
          - name: product_height_cm
            data_type: number
            expression: "$1:_airbyte_data:product_height_cm::number"
          - name: product_width_cm
            data_type: number
            expression: "$1:_airbyte_data:product_width_cm::number"

      - name: sellers_bronze
        description: "Merchant/Seller demographic locations"
        external:
          location: "@staging/raw/sellers/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: seller_id
            data_type: varchar
            expression: "$1:_airbyte_data:seller_id::varchar"
          - name: seller_zip_code_prefix
            data_type: varchar
            expression: "$1:_airbyte_data:seller_zip_code_prefix::varchar"
          - name: seller_city
            data_type: varchar
            expression: "$1:_airbyte_data:seller_city::varchar"
          - name: seller_state
            data_type: varchar
            expression: "$1:_airbyte_data:seller_state::varchar"

      - name: geolocation_bronze
        description: "Brazilian zip codes with latitude/longitude coordinates"
        external:
          location: "@staging/raw/geolocation/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: geolocation_zip_code_prefix
            data_type: varchar
            expression: "$1:_airbyte_data:geolocation_zip_code_prefix::varchar"
          - name: geolocation_lat
            data_type: float
            expression: "$1:_airbyte_data:geolocation_lat::float"
          - name: geolocation_lng
            data_type: float
            expression: "$1:_airbyte_data:geolocation_lng::float"
          - name: geolocation_city
            data_type: varchar
            expression: "$1:_airbyte_data:geolocation_city::varchar"
          - name: geolocation_state
            data_type: varchar
            expression: "$1:_airbyte_data:geolocation_state::varchar"

      - name: product_category_name_translation_bronze
        description: "Mapping of Portuguese category names to English"
        external:
          location: "@staging/raw/product_category_name_translation/"
        columns:
          - name: _airbyte_emitted_at
            data_type: timestamp
            expression: "$1:_airbyte_emitted_at::timestamp"
          - name: product_category_name
            data_type: varchar
            expression: "$1:_airbyte_data:product_category_name::varchar"
          - name: product_category_name_english
            data_type: varchar
            expression: "$1:_airbyte_data:product_category_name_english::varchar"