version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null

  - name: dim_seller
    columns:
      - name: seller_id
        tests:
          - not_null

  - name: dim_product
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_actual
        tests:
          - unique
          - not_null
      - name: date_id
        tests:
          - unique
          - not_null

  - name: dim_order_attribute
    columns:
      - name: attribute_id
        tests:
          - unique
          - not_null

  - name: dim_feedback_profile
    columns:
      - name: feedback_id
        tests:
          - unique
          - not_null

  - name: dim_geolocation
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - not_null

  - name: fact_sales
    description: "Order-line grain sales fact"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: seller_id
        tests:
          - not_null
      - name: price
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - order_item_id

  - name: fact_payment
    columns:
      - name: order_id
        tests:
          - not_null
      - name: attribute_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_order_attribute')
              field: attribute_id
      - name: payment_value
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - payment_sequential

  - name: fact_reviews
    columns:
      - name: review_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
