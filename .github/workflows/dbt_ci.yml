name: dbt CI
on:
  pull_request:
    branches: [main]
    paths:
      - "olist_ecommerce/models/**"
      - "olist_ecommerce/snapshots/**"
      - "olist_ecommerce/tests/**"
      - "olist_ecommerce/macros/**"
      - "olist_ecommerce/seeds/**"
      - "olist_ecommerce/dbt_project.yml"
      - "olist_ecommerce/packages.yml"

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-snowflake==1.8.*

      - name: Write profiles.yml from GitHub Secrets
        run: |
          cat > ${{ github.workspace }}/profiles.yml <<EOF
          olist_ecommerce:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_CI_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_CI_USER }}
                password: ${{ secrets.SNOWFLAKE_CI_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_CI_ROLE }}
                warehouse: ${{ secrets.SNOWFLAKE_CI_WAREHOUSE }}
                database: ${{ secrets.SNOWFLAKE_CI_DATABASE }}
                schema: CI_PR_${{ github.event.pull_request.number }}
                threads: 4
          EOF

      - name: dbt deps
        working-directory: olist_ecommerce
        run: dbt deps

      - name: dbt build (run + test)
        working-directory: olist_ecommerce
        run: dbt build --target ci

      - name: dbt docs generate (compile check)
        working-directory: olist_ecommerce
        run: dbt docs generate --target ci

      - name: Drop CI schema
        if: always()
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_CI_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_CI_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_CI_PASSWORD }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_CI_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_CI_WAREHOUSE }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_CI_DATABASE }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          pip install snowflake-connector-python
          python -c "
          import snowflake.connector, os
          conn = snowflake.connector.connect(
            account=os.environ['SNOWFLAKE_ACCOUNT'],
            user=os.environ['SNOWFLAKE_USER'],
            password=os.environ['SNOWFLAKE_PASSWORD'],
            role=os.environ['SNOWFLAKE_ROLE'],
            warehouse=os.environ['SNOWFLAKE_WAREHOUSE'],
          )
          conn.cursor().execute(
            'DROP SCHEMA IF EXISTS ' + os.environ['SNOWFLAKE_DATABASE'] + '.CI_PR_' + os.environ['PR_NUMBER']
          )
          "